variables:
  ENVIRONMENT: prod
  # S3 bucket lambda artifacts are uploaded to / pulled from by the CDK stack.
  BUCKET_NAME: wayroo-prod-codeartifacts
  ARTIFACTS_BUCKET_ARN: arn:aws:s3:::wayroo-prod-codeartifacts
  # SNS topic the CloudWatch alarms route to.
  ALARM_TOPIC_ARN: arn:aws:sns:us-east-1:075515629050:prod-DeveloperAlarmRelayTopic
  # Role assumed to run the CloudFormation deploy.
  CF_ROLE_ARN: arn:aws:iam::075515629050:role/prod-VSTS-ManageCFRole
  awsCredentialsAccount: rs-aws-luci-prod
  # VPC the recorder lambda runs in — needed so the lambda can resolve internal hostnames like
  # orders.luci-prod when looking up the store/tenant for a payment account. Mirrors the values
  # Wayroo.Notification uses for prod.
  WayrooVPCId: vpc-04f97464fb8094dd7
  ENVIRONMENT_VPC_SUBNET_IDS: "subnet-06d69e4d301091242,subnet-024605126ad4aeee0"
  # EventBridge bus where webhook events (e.g. ProPay credential webhooks) are published. The
  # CDK stack creates a Rule on this bus targeting the recorder lambda's source queue. The bus
  # itself is provisioned by another stack — we just import it by ARN.
  WEBHOOK_EVENT_BUS_ARN: arn:aws:events:us-east-1:075515629050:event-bus/prod-webhook-bus
  # ECS / Cloud Map resources the Payments API construct attaches to — the shared Wayroo ECS
  # security group and the luci-prod Cloud Map namespace (service registers as payments.luci-prod).
  # Shared per-account resources; mirrors the values Wayroo.Notification uses for prod.
  AWS_SecurityGroupId: "sg-0f78e65cd2af95c04"
  CloudMapNamespaceId: "ns-vy5bxti73kgbrbzl"
  CloudMapNamespaceArn: "arn:aws:servicediscovery:us-east-1:075515629050:namespace/ns-vy5bxti73kgbrbzl"
