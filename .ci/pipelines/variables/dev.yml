variables:
  ENVIRONMENT: dev
  # S3 bucket lambda artifacts are uploaded to / pulled from by the CDK stack.
  BUCKET_NAME: luci-dev-temp
  ARTIFACTS_BUCKET_ARN: arn:aws:s3:::luci-dev-temp
  # SNS topic the CloudWatch alarms route to.
  ALARM_TOPIC_ARN: arn:aws:sns:us-east-1:203538442868:dev-DeveloperAlarmRelayTopic
  # Role assumed to run the CloudFormation deploy.
  CF_ROLE_ARN: arn:aws:iam::203538442868:role/dev-VSTS-ManageCFRole
  awsCredentialsAccount: rs-aws-luci-dev
  # VPC the recorder lambda runs in — needed so the lambda can resolve internal hostnames like
  # orders.luci-dev when looking up the store/tenant for a payment account. Mirrors the values
  # Wayroo.Notification uses for dev.
  WayrooVPCId: vpc-002b82159df979c64
  ENVIRONMENT_VPC_SUBNET_IDS: "subnet-0c8efe661e7fb578f,subnet-062daf1f1a037a4c4"
  # EventBridge bus where webhook events (e.g. ProPay credential webhooks) are published. The
  # CDK stack creates a Rule on this bus targeting the recorder lambda's source queue. The bus
  # itself is provisioned by another stack — we just import it by ARN.
  WEBHOOK_EVENT_BUS_ARN: arn:aws:events:us-east-1:203538442868:event-bus/dev-webhook-bus
  # ECS / Cloud Map resources the Payments API construct attaches to — the shared Wayroo ECS
  # security group and the luci-dev Cloud Map namespace (service registers as payments.luci-dev).
  # Shared per-account resources; mirrors the values Wayroo.Notification uses for dev.
  AWS_SecurityGroupId: "sg-0302c7e05c649c3d9"
  CloudMapNamespaceId: "ns-7cssgf6cceuys427"
  CloudMapNamespaceArn: "arn:aws:servicediscovery:us-east-1:203538442868:namespace/ns-7cssgf6cceuys427"
